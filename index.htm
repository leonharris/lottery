<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Lottery number generator</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#3460f2">
	<link rel="stylesheet" href="assets/css/main.css">
  </head>
  <body>

    <h1>Lottery Number Generator</h1>
	<!--<p>Fed up of trying to come up with new numbers each week? Try this...</p>-->

	<div class="ball-grid" id="lotto" data-draw-type="lotto"></div>
	<div class="actions">
		<button id="btn_spin_lotto" class="btn">Spin the balls</button>
	</div>

	<div class="sync-row">
		<button id="btn_sync" class="btn-sync">Sync results</button>
		<span id="sync-label" class="sync-label"></span>
	</div>

	<div class="mode-selector-wrap">
		<div class="mode-selector">
			<button class="mode-btn active" data-mode="random">Random</button>
			<button class="mode-btn" data-mode="topn">Top N</button>
			<button class="mode-btn" data-mode="weighted">Weighted</button>
		</div>
		<button class="info-btn" id="info-btn" aria-label="Explain draw modes">i</button>
		<div class="info-popover" id="info-popover" hidden>
			<dl>
				<dt>Random</dt>
				<dd>Completely random numbers every spin.</dd>
				<dt>Top N</dt>
				<dd>The most frequently drawn numbers in history — same result every spin.</dd>
				<dt>Weighted</dt>
				<dd>Random, but biased toward numbers drawn more often.</dd>
			</dl>
		</div>
	</div>

	<div class="sort-toggle toggle">
		<label class="switch">
		  <input id="sort-toggle-switch" name="sort-toggle-switch" type="checkbox">
		  <span class="slider round"></span>
		</label>
		<span class="toggle--label">Sort balls</span>
	</div>

	<div class="draw-type-toggle toggle">
		<span class="toggle--label">Lotto</span>
		<label class="switch">
		  <input id="draw-type-toggle-switch" name="draw-type-toggle-switch" type="checkbox">
		  <span class="slider round"></span>
		</label>
		<span class="toggle--label">EuroMillions</span>
	</div>

    <div id="latest-draw-result"></div>

	<script src="assets/js/frequency-data.js"></script>
	<script src="assets/js/main.js"></script>

  </body>
</html>
